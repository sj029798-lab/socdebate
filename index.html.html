<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soc Debate Personality Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="intro-container">
  <img src="socpride.png" class="intro-logo">
  <h1 class="intro-title">คุณเป็นหนูนักพูดแบบไหน</h1>
  <p class="intro-subtitle">by soc.debate.ku</p>
  
  <div class="characters-grid">
    <div class="char-item">
      <img src="แดง.png" alt="EROS">
    </div>
    <div class="char-item">
      <img src="เหลือง.png" alt="STORGE">
    </div>
    <div class="char-item">
      <img src="น้ำเงิน.png" alt="LUDUS">
    </div>
    <div class="char-item">
      <img src="ส้ม.png" alt="AGAPE">
    </div>
    <div class="char-item">
      <img src="ม่วง.png" alt="MANIA">
    </div>
    <div class="char-item">
      <img src="เขียว.png" alt="PRAGMA">
    </div>
  </div>
  
  
  <button class="start-btn" onclick="startQuiz()">เริ่มทำแบบทดสอบ</button>
</div>

<div class="quiz-container">

<img src="socpride.png" class="logo">

<h1 class="quiz-title">คุณเป็นหนูนักพูดแบบไหน</h1>

<div class="progress">
ข้อ <span id="current">1</span> / 15
</div>

<div class="question-box">
<div class="question"></div>

<label class="option">
<input type="radio" name="option">
<span class="option1"></span>
</label>

<label class="option">
<input type="radio" name="option">
<span class="option2"></span>
</label>

<label class="option">
<input type="radio" name="option">
<span class="option3"></span>
</label>

</div>

<button class="next">Next</button>

</div>

<div class="result"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="script.js"></script>

</body>
</html>
